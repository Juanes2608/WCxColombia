<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-label="Trace It logo">
  <defs>
    <filter id="limeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.776 0 0 0 0 0.941 0 0 0 0 0.208 0 0 0 .55 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .word { font-family: 'Space Grotesk', 'Inter', 'DejaVu Sans', system-ui, sans-serif; font-weight: 600; letter-spacing: -2px; }
      .mono { font-family: 'JetBrains Mono', 'DejaVu Sans Mono', ui-monospace, monospace; font-weight: 500; letter-spacing: 5px; }
    </style>
  </defs>
  <g transform="translate(45 2) scale(0.92)">
    <g fill="none" stroke="#14181A" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
      <path d="M70 48 H42 Q34 48 34 56 V86"/>
      <path d="M186 48 H214 Q222 48 222 56 V86"/>
      <path d="M34 170 V200 Q34 208 42 208 H70"/>
      <path d="M222 170 V200 Q222 208 214 208 H186"/>
    </g>
    <g fill="#C6F035">
      <rect x="88" y="92" width="80" height="18" rx="3"/>
      <rect x="119" y="110" width="18" height="58" rx="2"/>
    </g>
  </g>
  <text class="word" x="316" y="128" font-size="76" fill="#14181A">Trace</text>
  <text class="word" x="610" y="128" font-size="76" fill="#C6F035">It</text>
  <text class="mono" x="320" y="178" font-size="22" fill="#2E322C">SCANNED. CHECKED. COURT-READY.</text>
</svg>
