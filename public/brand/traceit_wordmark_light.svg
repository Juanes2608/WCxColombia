<svg xmlns="http://www.w3.org/2000/svg" width="520" height="140" viewBox="0 0 520 140" role="img" aria-label="Trace It logo">
  <defs>
    <filter id="limeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.776 0 0 0 0 0.941 0 0 0 0 0.208 0 0 0 .55 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .word { font-family: 'Space Grotesk', 'Inter', 'DejaVu Sans', system-ui, sans-serif; font-weight: 600; letter-spacing: -2px; }
      .mono { font-family: 'JetBrains Mono', 'DejaVu Sans Mono', ui-monospace, monospace; font-weight: 500; letter-spacing: 5px; }
    </style>
  </defs>
  <text class="word" x="30" y="92" font-size="76" fill="#14181A">Trace</text>
  <text class="word" x="325" y="92" font-size="76" fill="#C6F035">It</text>
</svg>
