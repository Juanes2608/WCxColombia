<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TraceIT — V5 Light Five</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#14181A;--green:#5F8C00;--paper:#F6F7F2;--muted:#6E726A;
    --mono:'JetBrains Mono',monospace;--disp:'Space Grotesk',system-ui,sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--paper);overflow:hidden}
  #c{position:fixed;inset:0}
  #brand{position:fixed;top:30px;left:0;right:0;text-align:center;z-index:5;pointer-events:none}
  #brand .w{font-family:var(--disp);font-weight:600;font-size:24px;color:var(--ink)}
  #brand .m{width:42px;height:5px;background:var(--green);margin:7px auto 0;border-radius:2px}
  #foot{position:fixed;bottom:32px;left:0;right:0;text-align:center;z-index:5;pointer-events:none;
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--muted)}
</style></head><body>
<canvas id="c"></canvas>
<div id="brand"><div class="w">TraceIT</div><div class="m"></div></div>
<div id="foot">Trazando referencias…</div>
<script>
(function(){
  const cv=document.getElementById('c'),x=cv.getContext('2d');let W,H,DPR,cx,cy;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';x.setTransform(DPR,0,0,DPR,0,0);cx=W/2;cy=H/2+4}
  const labels=['§ 1','§ 2','§ 3','§ 4','§ 5'];let sats=[];
  function build(){sats=[];const R=Math.min(W,H)*.30;for(let i=0;i<5;i++){const a=-Math.PI/2+i*(2*Math.PI/5);sats.push({a,R,lab:labels[i],app:.5+i*.55})}}
  const CY=5.0;let t0=performance.now();const ease=p=>{p=Math.min(1,Math.max(0,p));return p*p*(3-2*p)};
  function frame(now){let t=((now-t0)/1000)%CY;x.clearRect(0,0,W,H);
    const bg=x.createRadialGradient(cx,cy,60,cx,cy,Math.max(W,H)*.7);bg.addColorStop(0,'#ffffff');bg.addColorStop(1,'#eef0e9');x.fillStyle=bg;x.fillRect(0,0,W,H);
    const breathe=Math.sin(now/700)*2;
    for(const s of sats){const p=ease((t-s.app)/.6);if(p<=0)continue;
      const sx=cx+Math.cos(s.a)*(s.R+breathe),sy=cy+Math.sin(s.a)*(s.R+breathe),ex=cx+(sx-cx)*p,ey=cy+(sy-cy)*p;
      x.strokeStyle='rgba(95,140,0,'+(.85*p).toFixed(2)+')';x.lineWidth=1.4;x.beginPath();x.moveTo(cx,cy);x.lineTo(ex,ey);x.stroke();
      if(p>.85){x.fillStyle='#5F8C00';x.beginPath();x.arc(sx,sy,4.5,0,6.283);x.fill();
        x.fillStyle='rgba(110,114,106,.95)';x.font='11px JetBrains Mono, monospace';x.textAlign='center';x.fillText(s.lab,sx,sy-12)}}
    chip(now);requestAnimationFrame(frame)}
  function chip(now){const w=58,h=44,xx=cx-w/2,yy=cy-h/2;x.fillStyle='#ffffff';rr(xx,yy,w,h,12);x.fill();
    x.strokeStyle='#E2E6D9';x.lineWidth=1;x.stroke();const sy=yy+6+(Math.sin(now/600)*.5+.5)*(h-12);
    x.save();rr(xx,yy,w,h,12);x.clip();const lg=x.createLinearGradient(0,sy-7,0,sy+7);lg.addColorStop(0,'rgba(198,240,53,0)');lg.addColorStop(.5,'rgba(198,240,53,.6)');lg.addColorStop(1,'rgba(198,240,53,0)');x.fillStyle=lg;x.fillRect(xx,sy-7,w,14);x.restore();
    x.strokeStyle='#5F8C00';x.lineWidth=2;x.lineCap='round';const ox=xx-7,oy=yy-7,ww=w+14,hh=h+14,c=11;
    cor(ox,oy,1,1,c);cor(ox+ww,oy,-1,1,c);cor(ox,oy+hh,1,-1,c);cor(ox+ww,oy+hh,-1,-1,c)}
  function cor(px,py,sx,sy,c){x.beginPath();x.moveTo(px+sx*c,py);x.lineTo(px,py);x.lineTo(px,py+sy*c);x.stroke()}
  function rr(a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath()}
  addEventListener('resize',()=>{resize();build()});resize();build();requestAnimationFrame(frame);
})();
</script></body></html>
