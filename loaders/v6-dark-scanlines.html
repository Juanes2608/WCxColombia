<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TraceIT — V6 Dark Scanlines</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--black:#14181A;--lime:#C6F035;--paper:#F6F7F2;--graphite:#39433f;--muted:#5A625F;
    --mono:'JetBrains Mono',monospace;--disp:'Space Grotesk',system-ui,sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--black);overflow:hidden;font-family:var(--disp)}
  .stage{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(800px 600px at 50% 45%,#171c1f,#0e1214)}
  .doc{position:relative;width:240px;height:150px;padding:22px 20px}
  .doc .frame{position:absolute;inset:0;border-radius:10px;background:#191f20;box-shadow:inset 0 0 0 1px rgba(198,240,53,.14)}
  .lines{position:relative;z-index:2;display:flex;flex-direction:column;gap:11px}
  .ln{height:6px;border-radius:3px;background:var(--graphite)}
  /* copia lime revelada por la banda */
  .reveal{position:absolute;inset:22px 20px;z-index:3;overflow:hidden;
    clip-path:inset(0 0 100% 0);animation:wipe 2.8s cubic-bezier(.45,0,.2,1) infinite}
  .reveal .lines .ln{background:var(--lime);box-shadow:0 0 7px rgba(198,240,53,.45)}
  @keyframes wipe{0%{clip-path:inset(0 0 100% 0);opacity:0}8%{opacity:1}
    92%{clip-path:inset(0 0 0 0);opacity:1}100%{clip-path:inset(0 0 0 0);opacity:0}}
  .band{position:absolute;left:14px;right:14px;height:3px;z-index:4;border-radius:2px;background:var(--lime);
    box-shadow:0 0 12px 2px rgba(198,240,53,.6);animation:band 2.8s cubic-bezier(.45,0,.2,1) infinite}
  @keyframes band{0%{top:22px;opacity:0}8%{opacity:1}92%{top:128px;opacity:1}100%{top:128px;opacity:0}}
  .brand{position:absolute;left:0;right:0;bottom:60px;text-align:center}
  .brand .w{font-weight:600;font-size:21px;color:var(--paper)}
  .brand .m{width:40px;height:5px;background:var(--lime);margin:7px auto 0;border-radius:2px;box-shadow:0 0 12px rgba(198,240,53,.6)}
  .tag{position:absolute;left:0;right:0;top:60px;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
</style></head><body>
<div class="stage">
  <div class="tag">reading citations</div>
  <div class="doc">
    <div class="frame"></div>
    <div class="lines">
      <div class="ln" style="width:90%"></div><div class="ln" style="width:78%"></div>
      <div class="ln" style="width:96%"></div><div class="ln" style="width:64%"></div>
      <div class="ln" style="width:88%"></div><div class="ln" style="width:72%"></div>
    </div>
    <div class="reveal"><div class="lines">
      <div class="ln" style="width:90%"></div><div class="ln" style="width:78%"></div>
      <div class="ln" style="width:96%"></div><div class="ln" style="width:64%"></div>
      <div class="ln" style="width:88%"></div><div class="ln" style="width:72%"></div>
    </div></div>
    <div class="band"></div>
  </div>
  <div class="brand"><div class="w">TraceIT</div><div class="m"></div></div>
</div></body></html>
