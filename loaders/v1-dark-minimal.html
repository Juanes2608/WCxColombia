<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TraceIT — V1 Dark Minimal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--black:#14181A;--lime:#C6F035;--paper:#F6F7F2;--graphite:#5A625F;
    --mono:'JetBrains Mono',monospace;--disp:'Space Grotesk',system-ui,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--black);overflow:hidden;font-family:var(--disp)}
  .stage{position:fixed;inset:0;display:grid;place-items:center;
    background:radial-gradient(900px 600px at 50% 45%,#171c1f,#0e1214)}
  .chip{position:relative;width:108px;height:80px}
  .tile{position:absolute;inset:0;background:#1b2122;border-radius:16px;
    box-shadow:inset 0 0 0 1px rgba(198,240,53,.18)}
  /* reticula: 4 esquinas */
  .ret{position:absolute;width:22px;height:22px;border:2px solid var(--lime)}
  .ret.tl{top:-9px;left:-9px;border-right:0;border-bottom:0;border-radius:6px 0 0 0}
  .ret.tr{top:-9px;right:-9px;border-left:0;border-bottom:0;border-radius:0 6px 0 0}
  .ret.bl{bottom:-9px;left:-9px;border-right:0;border-top:0;border-radius:0 0 0 6px}
  .ret.br{bottom:-9px;right:-9px;border-left:0;border-top:0;border-radius:0 0 6px 0}
  .ret{animation:ret 2.6s ease-in-out infinite}
  @keyframes ret{0%,100%{opacity:.45}45%{opacity:1}}
  /* scan-line */
  .scan{position:absolute;left:6px;right:6px;height:14px;border-radius:8px;
    background:linear-gradient(180deg,transparent,rgba(198,240,53,.5),transparent);
    filter:drop-shadow(0 0 6px rgba(198,240,53,.5));animation:scan 2.6s cubic-bezier(.4,0,.2,1) infinite}
  @keyframes scan{0%{top:4px;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:62px;opacity:0}}
  .brand{position:absolute;left:0;right:0;bottom:64px;text-align:center}
  .brand .w{font-weight:600;font-size:21px;color:var(--paper);letter-spacing:.02em}
  .brand .m{width:40px;height:5px;background:var(--lime);margin:7px auto 0;border-radius:2px;
    box-shadow:0 0 12px rgba(198,240,53,.6)}
  .bar{position:absolute;left:50%;bottom:40px;transform:translateX(-50%);
    width:200px;height:2px;background:rgba(198,240,53,.12);border-radius:2px;overflow:hidden}
  .bar i{position:absolute;inset:0 100% 0 0;background:var(--lime);border-radius:2px;
    box-shadow:0 0 8px rgba(198,240,53,.5);animation:fill 2.6s cubic-bezier(.4,0,.2,1) infinite}
  @keyframes fill{0%{right:100%}80%{right:0}100%{right:0}}
  .tag{position:absolute;left:0;right:0;top:64px;text-align:center;
    font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--graphite)}
</style></head><body>
<div class="stage">
  <div class="tag">forensic scan</div>
  <div class="chip">
    <div class="tile"></div><div class="scan"></div>
    <div class="ret tl"></div><div class="ret tr"></div><div class="ret bl"></div><div class="ret br"></div>
  </div>
  <div class="brand"><div class="w">TraceIT</div><div class="m"></div></div>
  <div class="bar"><i></i></div>
</div>
</body></html>
